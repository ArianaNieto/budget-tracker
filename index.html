<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Budget Tracker 💸</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #16213e;
  --accent: #7c6af7;
  --accent2: #56cfb2;
  --accent3: #f7a76c;
  --danger: #f76c8a;
  --text: #e8e8f0;
  --muted: #888aaa;
  --radius: 18px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { color-scheme: dark; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.tab-bar { display: flex; background: var(–surface); border-bottom: 1px solid #ffffff10; position: sticky; top: 0; z-index: 100; }
.tab-bar button { flex: 1; padding: 16px 8px; border: none; background: none; color: var(–muted); font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; transition: all .2s; }
.tab-bar button.active { color: var(–accent); border-bottom-color: var(–accent); }

.header { background: linear-gradient(135deg, #7c6af7 0%, #56cfb2 100%); padding: 28px 20px 20px; text-align: center; }
.header h1 { font-size: 26px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
.header p  { font-size: 13px; color: rgba(255,255,255,.75); margin-top: 4px; }

.page { display: none; padding: 20px; max-width: 480px; margin: 0 auto; }
.page.active { display: block; }

.card { background: var(–surface); border-radius: var(–radius); padding: 20px; margin-bottom: 16px; border: 1px solid #ffffff08; }
.card-title { font-size: 12px; font-weight: 700; color: var(–muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }

.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(–muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .6px; }
.form-group input, .form-group select {
width: 100%; background: var(–surface2); border: 1.5px solid #ffffff12;
border-radius: var(–radius-sm); color: var(–text); font-size: 15px;
padding: 12px 14px; outline: none; transition: border-color .2s; -webkit-appearance: none;
-webkit-text-fill-color: var(–text);
color-scheme: dark;
}
.form-group input:focus, .form-group select:focus { border-color: var(–accent); }
.form-group select option { background: #1a1a2e; color: var(–text); }
/* Fix Safari autofill / system override */
.form-group input:-webkit-autofill,
.form-group input:-webkit-autofill:focus {
-webkit-box-shadow: 0 0 0 100px var(–surface2) inset !important;
-webkit-text-fill-color: var(–text) !important;
}

.amount-wrap { position: relative; }
.amount-wrap .currency { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(–accent2); font-weight: 700; font-size: 15px; pointer-events: none; }
.amount-wrap input { padding-left: 38px; }

.currency-toggle { display: flex; gap: 8px; margin-bottom: 14px; }
.currency-toggle button { flex: 1; padding: 10px; border-radius: var(–radius-sm); border: 1.5px solid #ffffff15; background: var(–surface2); color: var(–muted); font-size: 13px; font-weight: 700; cursor: pointer; transition: all .2s; }
.currency-toggle button.active { background: var(–accent); border-color: var(–accent); color: #fff; }

.btn-submit { width: 100%; padding: 16px; background: linear-gradient(135deg, var(–accent), var(–accent2)); border: none; border-radius: var(–radius-sm); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 4px; transition: opacity .2s, transform .1s; }
.btn-submit:active { transform: scale(.98); opacity: .9; }
.btn-submit:disabled { opacity: .5; cursor: not-allowed; }

.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(–accent2); color: #0f0f1a; padding: 12px 24px; border-radius: 50px; font-weight: 700; font-size: 14px; transition: transform .35s cubic-bezier(.34,1.56,.64,1); z-index: 9999; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── PILLS ── */
.pills-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.pill { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 50px; font-size: 12px; font-weight: 600; border: none; cursor: default; }
.pill .del { background: none; border: none; color: inherit; cursor: pointer; font-size: 14px; line-height: 1; opacity: .7; }

/* ── ADD CAT ROW ── */
.add-cat-row { display: flex; gap: 8px; align-items: center; }
.emoji-btn {
width: 48px; height: 48px; flex-shrink: 0;
background: var(–surface2); border: 1.5px solid #ffffff12;
border-radius: var(–radius-sm); font-size: 22px;
cursor: pointer; display: flex; align-items: center; justify-content: center;
transition: border-color .2s;
}
.emoji-btn:focus, .emoji-btn.open { border-color: var(–accent); outline: none; }
.add-cat-row input { flex: 1; background: var(–surface2); border: 1.5px solid #ffffff12; border-radius: var(–radius-sm); color: var(–text); font-size: 14px; padding: 12px 14px; outline: none; height: 48px; }
.add-cat-row input:focus { border-color: var(–accent); }
.add-cat-row .plus-btn { width: 48px; height: 48px; flex-shrink: 0; padding: 0; background: var(–accent); border: none; border-radius: var(–radius-sm); color: #fff; font-weight: 700; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* ── EMOJI PICKER ── */
.emoji-picker {
display: none;
position: fixed;
bottom: 0; left: 0; right: 0;
background: var(–surface);
border-top: 1px solid #ffffff15;
border-radius: 20px 20px 0 0;
padding: 16px;
z-index: 1000;
max-height: 60vh;
overflow-y: auto;
-webkit-overflow-scrolling: touch;
}
.emoji-picker.open { display: block; }
.picker-overlay { display: none; position: fixed; inset: 0; background: #00000060; z-index: 999; }
.picker-overlay.open { display: block; }
.picker-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.picker-header span { font-size: 14px; font-weight: 700; color: var(–muted); }
.picker-close { background: none; border: none; color: var(–muted); font-size: 22px; cursor: pointer; padding: 0; line-height: 1; }
.picker-tabs { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 12px; padding-bottom: 4px; scrollbar-width: none; }
.picker-tabs::-webkit-scrollbar { display: none; }
.picker-tab { flex-shrink: 0; padding: 6px 12px; background: var(–surface2); border: none; border-radius: 50px; font-size: 18px; cursor: pointer; opacity: .6; transition: opacity .2s; }
.picker-tab.active { opacity: 1; background: var(–accent)22; }
.emoji-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
.emoji-grid button { background: none; border: none; font-size: 26px; cursor: pointer; padding: 6px; border-radius: 8px; transition: background .15s; line-height: 1; }
.emoji-grid button:active { background: #ffffff15; }

/* ── DASHBOARD ── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.stat-card { background: var(–surface); border-radius: var(–radius); padding: 16px; border: 1px solid #ffffff08; }
.stat-card .label { font-size: 11px; color: var(–muted); font-weight: 600; text-transform: uppercase; letter-spacing: .8px; }
.stat-card .value { font-size: 20px; font-weight: 800; margin-top: 6px; line-height: 1; }
.stat-card .value.ars { color: var(–accent2); }
.stat-card .value.usd { color: var(–accent3); }
.stat-card .value.count { color: var(–accent); }
canvas { max-width: 100%; }

.cat-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #ffffff08; gap: 12px; }
.cat-row:last-child { border-bottom: none; }
.cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.progress-bar { height: 4px; background: #ffffff10; border-radius: 4px; margin-top: 4px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 4px; transition: width .6s ease; }

.tx-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #ffffff06; }
.tx-item:last-child { border-bottom: none; }
.tx-emoji { font-size: 22px; width: 36px; text-align: center; }
.tx-info { flex: 1; }
.tx-info .tx-name { font-size: 14px; font-weight: 600; }
.tx-info .tx-meta { font-size: 12px; color: var(–muted); margin-top: 2px; }
.tx-amount { font-size: 15px; font-weight: 700; }

.month-selector { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.month-selector button { background: var(–surface); border: 1px solid #ffffff10; color: var(–text); border-radius: var(–radius-sm); padding: 8px 14px; font-size: 18px; cursor: pointer; }
.month-selector span { font-size: 15px; font-weight: 700; }

.sheets-input { display: flex; flex-direction: column; gap: 10px; }
.sheets-input input { background: var(–surface2); border: 1.5px solid #ffffff12; border-radius: var(–radius-sm); color: var(–text); font-size: 14px; padding: 12px 14px; outline: none; }
.sheets-input input:focus { border-color: var(–accent); }
.sheets-input button { padding: 12px; background: var(–accent); border: none; border-radius: var(–radius-sm); color: #fff; font-weight: 700; cursor: pointer; }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.status-dot.ok { background: var(–accent2); }
.status-dot.off { background: var(–muted); }

.empty { text-align: center; padding: 40px 20px; color: var(–muted); }
.empty .emoji { font-size: 40px; margin-bottom: 10px; }
.empty p { font-size: 14px; }
</style>

</head>
<body>

<div class="tab-bar">
  <button class="active" onclick="goTab('add')">➕ Cargar</button>
  <button onclick="goTab('dash')">📊 Resumen</button>
  <button onclick="goTab('settings')">⚙️ Config</button>
</div>

<div class="header">
  <h1>Budget Tracker 💸</h1>
  <p id="header-sub"></p>
</div>

<!-- TAB 1 -->

<div id="tab-add" class="page active">
  <div class="card" style="margin-top:20px">
    <div class="card-title">Nuevo gasto</div>
    <div class="form-group">
      <label>Descripción</label>
      <input id="f-desc" type="text" placeholder="ej: Almuerzo, Alquiler, Netflix…" autocomplete="off"/>
    </div>
    <div class="form-group">
      <label>Categoría</label>
      <select id="f-cat"></select>
    </div>
    <div class="form-group">
      <label>Moneda</label>
      <div class="currency-toggle">
        <button id="btn-ars" class="active" onclick="setCurrency('ARS')">🇦🇷 ARS $</button>
        <button id="btn-usd" onclick="setCurrency('USD')">🇺🇸 USD $</button>
      </div>
    </div>
    <div class="form-group">
      <label>Monto</label>
      <div class="amount-wrap">
        <span class="currency" id="currency-symbol">$</span>
        <input id="f-amount" type="number" placeholder="0.00" min="0" step="0.01"/>
      </div>
    </div>
    <div class="form-group">
      <label>Fecha</label>
      <input id="f-date" type="date"/>
    </div>
    <button class="btn-submit" id="btn-save" onclick="saveExpense()">Guardar gasto ✓</button>
  </div>
  <div class="card">
    <div class="card-title">Últimos gastos</div>
    <div id="recent-list"></div>
  </div>
</div>

<!-- TAB 2 -->

<div id="tab-dash" class="page">
  <div class="month-selector" style="margin-top:20px">
    <button onclick="changeMonth(-1)">‹</button>
    <span id="dash-month-label"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <div class="stat-grid">
    <div class="stat-card"><div class="label">Total ARS</div><div class="value ars" id="stat-ars">$0</div></div>
    <div class="stat-card"><div class="label">Total USD</div><div class="value usd" id="stat-usd">U$S 0</div></div>
    <div class="stat-card"><div class="label">Gastos</div><div class="value count" id="stat-count">0</div></div>
    <div class="stat-card"><div class="label">Categorías</div><div class="value count" id="stat-cats">0</div></div>
  </div>
  <div class="card">
    <div class="card-title">Por categoría (ARS)</div>
    <canvas id="chart-pie" height="220"></canvas>
  </div>
  <div class="card">
    <div class="card-title">Desglose</div>
    <div id="cat-breakdown"></div>
  </div>
  <div class="card">
    <div class="card-title">Gastos del mes</div>
    <div id="full-list"></div>
  </div>
</div>

<!-- TAB 3 -->

<div id="tab-settings" class="page">
  <div class="card" style="margin-top:20px">
    <div class="card-title">Categorías</div>
    <div class="pills-wrap" id="cat-pills"></div>
    <div class="add-cat-row">
      <button class="emoji-btn" id="emoji-trigger" onclick="openPicker()">📌</button>
      <input id="new-cat-input" placeholder="Nueva categoría…" />
      <button class="plus-btn" onclick="addCategory()">+</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span class="status-dot" id="sheets-dot"></span>Sincronizar con Google Sheets</div>
    <div class="sheets-input">
      <input id="sheets-url" placeholder="URL del Google Apps Script…" />
      <button onclick="saveSheetConfig()">Guardar</button>
    </div>
    <p style="font-size:12px;color:var(--muted);margin-top:12px;line-height:1.6">Pegá acá la URL del Apps Script.<br>Los datos se sincronizan automáticamente al guardar.</p>
  </div>

  <div class="card">
    <div class="card-title">Datos locales</div>
    <button onclick="exportCSV()" style="width:100%;padding:12px;background:var(--surface2);border:1.5px solid #ffffff15;border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px">📥 Exportar CSV</button>
    <button onclick="clearAll()" style="width:100%;padding:12px;background:transparent;border:1.5px solid var(--danger);border-radius:var(--radius-sm);color:var(--danger);font-size:14px;font-weight:600;cursor:pointer">🗑️ Borrar todos los datos</button>
  </div>
</div>

<!-- EMOJI PICKER -->

<div class="picker-overlay" id="picker-overlay" onclick="closePicker()"></div>
<div class="emoji-picker" id="emoji-picker">
  <div class="picker-header">
    <span>Elegí un emoji</span>
    <button class="picker-close" onclick="closePicker()">×</button>
  </div>
  <div class="picker-tabs" id="picker-tabs"></div>
  <div class="emoji-grid" id="emoji-grid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── EMOJI DATA ──
const EMOJI_CATS = [
  { label: '😀', name: 'Caritas', emojis: ['😀','😂','🥰','😎','🤩','😇','🥳','😋','🤑','😤','🤗','🫶','👍','🙌','💪','🧠','👀','❤️','🔥','✨','⭐','💫','🎉','🎊','💯','✅','❌','⚡','💥','🌈'] },
  { label: '🍔', name: 'Comida', emojis: ['🍔','🍕','🍣','🍜','🌮','🌯','🥗','🍱','🍛','🥩','🍗','🥚','🧆','🥪','🍟','🌭','🥓','🧀','🥑','🥦','🍎','🍊','🍋','🍇','🍓','🍰','🎂','🍩','🍪','☕','🧃','🍺','🥂','🍷'] },
  { label: '🚗', name: 'Transporte', emojis: ['🚗','🚕','🚙','🚌','🚎','🏎️','🚓','🚑','🚒','✈️','🚀','🛸','🚂','⛵','🚁','🛵','🏍️','🚲','🛴','🛺','⛽','🅿️','🗺️','🧳','🎒'] },
  { label: '🏠', name: 'Hogar', emojis: ['🏠','🏡','🏢','🏗️','🛋️','🪑','🛏️','🚿','🛁','🪴','🧹','🧺','🧻','🪣','🔧','🔨','🪛','💡','🔑','🚪','🪟','🧯','📦','🗃️','🗑️','🧲','🪜'] },
  { label: '💊', name: 'Salud', emojis: ['💊','💉','🩺','🩹','🏥','🧬','🦷','👁️','🧘','🏋️','🚴','🧗','🤸','⚽','🏀','🎾','🏊','🥊','🛌','😴','🧖','💆'] },
  { label: '👗', name: 'Ropa', emojis: ['👗','👔','👕','👖','🧥','🥻','👚','👛','👜','👝','🎒','🧣','🧤','🧢','👒','🎩','👑','💄','💍','💎','👠','👟','🥿','🥾','👞','🩴'] },
  { label: '📚', name: 'Educación', emojis: ['📚','📖','📝','✏️','🖊️','📐','📏','🔬','🔭','🖥️','💻','📱','🖨️','⌨️','🖱️','📡','🎓','🏫','📊','📈','📉','🗒️','📋','📌','📍','🗂️'] },
  { label: '🎬', name: 'Ocio', emojis: ['🎬','🎭','🎨','🎤','🎸','🎹','🥁','🎺','🎻','🎮','🕹️','🎲','🧩','🎯','🎳','🎪','🎠','🎡','🎢','🎟️','🎫','🃏','🀄','♟️','🎰','🧸','🪆','🎁','🎀','🎗️','🪅'] },
  { label: '💰', name: 'Dinero', emojis: ['💰','💵','💴','💶','💷','💸','💳','🏦','📈','📉','🪙','💹','🏧','💱','🤝','🧾','📊','🏷️','🎫','🛒','🛍️','🏪','🏬','⚖️'] },
  { label: '🐶', name: 'Animales', emojis: ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔','🐧','🐦','🦆','🦅','🦉','🦇','🐺','🐗','🦄','🐝','🐛','🦋','🐌','🐞'] },
  { label: '🌿', name: 'Naturaleza', emojis: ['🌿','🌱','🌲','🌳','🌴','🌵','🌾','🍀','🌺','🌸','🌼','🌻','🌞','🌝','🌛','⭐','🌙','☀️','⛅','🌧️','⛈️','❄️','🌊','🌈','🌋','🏔️','🏝️','🗻','🌍'] },
];

let selectedEmoji = '📌';

function openPicker() {
  document.getElementById('picker-overlay').classList.add('open');
  document.getElementById('emoji-picker').classList.add('open');
  renderPickerTabs();
}
function closePicker() {
  document.getElementById('picker-overlay').classList.remove('open');
  document.getElementById('emoji-picker').classList.remove('open');
}
function renderPickerTabs(activeIdx = 0) {
  const tabs = document.getElementById('picker-tabs');
  tabs.innerHTML = EMOJI_CATS.map((c, i) => `
    <button class="picker-tab ${i===activeIdx?'active':''}" onclick="renderPickerTabs(${i})">${c.label}</button>
  `).join('');
  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = EMOJI_CATS[activeIdx].emojis.map(e => `
    <button onclick="selectEmoji('${e}')">${e}</button>
  `).join('');
}
function selectEmoji(e) {
  selectedEmoji = e;
  document.getElementById('emoji-trigger').textContent = e;
  closePicker();
}

// ── STATE ──
const CAT_COLORS = ['#7c6af7','#56cfb2','#f7a76c','#f76c8a','#6cf7c8','#f7e66c','#6ca8f7','#cf56cf','#f7cf56','#56f7cf','#f756a7','#a7f756'];
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// Categorías default con emoji propio
const DEFAULT_CATS = [
  {name:'Salidas',emoji:'🍽️'},{name:'Auto',emoji:'🚗'},{name:'Gimnasio',emoji:'💪'},
  {name:'Alquiler',emoji:'🏠'},{name:'Supermercado',emoji:'🛒'},{name:'Farmacia',emoji:'💊'},
  {name:'Ropa',emoji:'👗'},{name:'Educación',emoji:'📚'},{name:'Tecnología',emoji:'💻'},
  {name:'Entretenimiento',emoji:'🎬'},{name:'Transporte',emoji:'🚌'},{name:'Otro',emoji:'📌'},
];

let state = {
  expenses: [],
  categories: DEFAULT_CATS,  // [{name, emoji}]
  sheetsUrl: '',
  currency: 'ARS',
  dashMonth: new Date().getMonth(),
  dashYear:  new Date().getFullYear(),
};
let pieChart = null;

function save() { localStorage.setItem('bt_state_v2', JSON.stringify(state)); }
function load() {
  try {
    const raw = localStorage.getItem('bt_state_v2');
    if (raw) {
      const s = JSON.parse(raw);
      // migrar categorías viejas (string) al nuevo formato {name, emoji}
      if (s.categories && typeof s.categories[0] === 'string') {
        s.categories = s.categories.map(n => {
          const def = DEFAULT_CATS.find(d => d.name === n);
          return def || { name: n, emoji: '📌' };
        });
      }
      state = { ...state, ...s };
    } else {
      // intentar migrar desde clave vieja
      const old = localStorage.getItem('bt_state');
      if (old) {
        const s = JSON.parse(old);
        if (s.expenses)    state.expenses    = s.expenses;
        if (s.sheetsUrl)   state.sheetsUrl   = s.sheetsUrl;
        if (s.categories)  state.categories  = s.categories.map(n => {
          const def = DEFAULT_CATS.find(d => d.name === n);
          return def || { name: n, emoji: '📌' };
        });
      }
    }
  } catch(e) {}
}

// ── TABS ──
function goTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('.tab-bar button')[{add:0,dash:1,settings:2}[tab]].classList.add('active');
  if (tab==='dash')     renderDash();
  if (tab==='settings') renderSettings();
}

// ── MONEDA ──
function setCurrency(c) {
  state.currency = c;
  document.getElementById('btn-ars').classList.toggle('active', c==='ARS');
  document.getElementById('btn-usd').classList.toggle('active', c==='USD');
  document.getElementById('currency-symbol').textContent = c==='ARS'?'$':'U$S';
}

// ── GUARDAR GASTO ──
async function saveExpense() {
  const desc   = document.getElementById('f-desc').value.trim();
  const cat    = document.getElementById('f-cat').value;
  const amount = parseFloat(document.getElementById('f-amount').value);
  const date   = document.getElementById('f-date').value;
  if (!desc||!cat||isNaN(amount)||amount<=0||!date) { showToast('⚠️ Completá todos los campos','#f76c8a'); return; }
  const expense = { id: Date.now(), desc, cat, amount, currency: state.currency, date };
  state.expenses.push(expense); save();
  document.getElementById('f-desc').value='';
  document.getElementById('f-amount').value='';
  renderRecent();
  showToast('✅ Gasto guardado');
  if (state.sheetsUrl) {
    const btn = document.getElementById('btn-save');
    btn.disabled=true; btn.textContent='Sincronizando…';
    try { await sendToSheets(expense); showToast('☁️ Sincronizado con Sheets'); }
    catch(e) { showToast('⚠️ Guardado local. Sin sync.','#f7a76c'); }
    finally { btn.disabled=false; btn.textContent='Guardar gasto ✓'; }
  }
}

async function sendToSheets(expense) {
  const params = new URLSearchParams({ id:expense.id, date:expense.date, desc:expense.desc, cat:expense.cat, amount:expense.amount, currency:expense.currency });
  await fetch(state.sheetsUrl+'?'+params.toString(), { method:'GET', mode:'no-cors' });
}

// ── HELPERS ──
function catObj(name) { return state.categories.find(c=>c.name===name) || {name, emoji:'📌'}; }
function catEmoji(name) { return catObj(name).emoji; }
function catColor(name) { const i=state.categories.findIndex(c=>c.name===name); return CAT_COLORS[i%CAT_COLORS.length]||'#888aaa'; }
function fmt(n) { return n.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d) { const [y,m,day]=d.split('-'); return `${day}/${m}/${y}`; }
function showToast(msg,color='#56cfb2') {
  const t=document.getElementById('toast'); t.textContent=msg; t.style.background=color;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400);
}

// ── RENDER RECIENTE ──
function renderRecent() {
  const el=document.getElementById('recent-list');
  const last5=[...state.expenses].reverse().slice(0,5);
  if (!last5.length) { el.innerHTML='<div class="empty"><div class="emoji">🌵</div><p>Todavía no hay gastos.<br>¡Cargá el primero!</p></div>'; return; }
  el.innerHTML=last5.map(e=>`
    <div class="tx-item">
      <div class="tx-emoji">${catEmoji(e.cat)}</div>
      <div class="tx-info"><div class="tx-name">${e.desc}</div><div class="tx-meta">${e.cat} · ${fmtDate(e.date)}</div></div>
      <div class="tx-amount" style="color:${catColor(e.cat)}">${e.currency==='USD'?'U$S ':'$'}${fmt(e.amount)}</div>
    </div>`).join('');
}

// ── DASHBOARD ──
function changeMonth(dir) {
  state.dashMonth+=dir;
  if (state.dashMonth>11){state.dashMonth=0;state.dashYear++;}
  if (state.dashMonth<0) {state.dashMonth=11;state.dashYear--;}
  renderDash();
}
function monthExpenses() {
  return state.expenses.filter(e=>{ const d=new Date(e.date+'T00:00:00'); return d.getMonth()===state.dashMonth&&d.getFullYear()===state.dashYear; });
}
function renderDash() {
  const exps=monthExpenses();
  document.getElementById('dash-month-label').textContent=`${MONTHS[state.dashMonth]} ${state.dashYear}`;
  document.getElementById('stat-ars').textContent='$'+fmt(exps.filter(e=>e.currency==='ARS').reduce((s,e)=>s+e.amount,0));
  document.getElementById('stat-usd').textContent='U$S '+fmt(exps.filter(e=>e.currency==='USD').reduce((s,e)=>s+e.amount,0));
  document.getElementById('stat-count').textContent=exps.length;
  document.getElementById('stat-cats').textContent=new Set(exps.map(e=>e.cat)).size;
  renderPie(exps); renderBreakdown(exps); renderFullList(exps);
}
function renderPie(exps) {
  const ars=exps.filter(e=>e.currency==='ARS'), bycat={};
  ars.forEach(e=>{ bycat[e.cat]=(bycat[e.cat]||0)+e.amount; });
  const cats=Object.keys(bycat), vals=cats.map(c=>bycat[c]);
  const ctx=document.getElementById('chart-pie').getContext('2d');
  if (pieChart) pieChart.destroy();
  if (!cats.length) { document.getElementById('cat-breakdown').innerHTML='<div class="empty"><div class="emoji">📭</div><p>Sin gastos en ARS este mes.</p></div>'; return; }
  pieChart=new Chart(ctx,{
    type:'doughnut',
    data:{ labels:cats.map(c=>`${catEmoji(c)} ${c}`), datasets:[{ data:vals, backgroundColor:cats.map(c=>catColor(c)), borderWidth:0, hoverOffset:8 }] },
    options:{ plugins:{ legend:{ position:'bottom', labels:{ color:'#888aaa', font:{size:12}, padding:16, boxWidth:12 } }, tooltip:{ callbacks:{ label:ctx=>` $${fmt(ctx.parsed)} (${((ctx.parsed/vals.reduce((a,b)=>a+b,0))*100).toFixed(1)}%)` } } }, cutout:'60%' }
  });
}
function renderBreakdown(exps) {
  const ars=exps.filter(e=>e.currency==='ARS'), bycat={};
  ars.forEach(e=>{ bycat[e.cat]=(bycat[e.cat]||0)+e.amount; });
  const total=ars.reduce((s,e)=>s+e.amount,0);
  const el=document.getElementById('cat-breakdown');
  const sorted=Object.entries(bycat).sort((a,b)=>b[1]-a[1]);
  if (!sorted.length) { el.innerHTML=''; return; }
  el.innerHTML=sorted.map(([cat,amount])=>{
    const pct=total?(amount/total*100).toFixed(1):0, color=catColor(cat);
    return `<div class="cat-row">
      <div class="cat-dot" style="background:${color}"></div>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:14px">${catEmoji(cat)} ${cat}</span>
          <div><span style="font-size:14px;font-weight:700;color:${color}">$${fmt(amount)}</span><span style="font-size:12px;color:var(--muted);margin-left:8px">${pct}%</span></div>
        </div>
        <div class="progress-bar"><div class="progress-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      </div></div>`;
  }).join('');
}
function renderFullList(exps) {
  const el=document.getElementById('full-list');
  if (!exps.length) { el.innerHTML='<div class="empty"><div class="emoji">📭</div><p>Sin gastos este mes.</p></div>'; return; }
  el.innerHTML=[...exps].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(e=>`
    <div class="tx-item">
      <div class="tx-emoji">${catEmoji(e.cat)}</div>
      <div class="tx-info"><div class="tx-name">${e.desc}</div><div class="tx-meta">${e.cat} · ${fmtDate(e.date)}</div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <div class="tx-amount" style="color:${catColor(e.cat)}">${e.currency==='USD'?'U$S ':'$'}${fmt(e.amount)}</div>
        <button onclick="deleteExpense(${e.id})" style="background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer">✕</button>
      </div>
    </div>`).join('');
}
function deleteExpense(id) { state.expenses=state.expenses.filter(e=>e.id!==id); save(); renderDash(); renderRecent(); }

// ── SETTINGS ──
function renderSettings() {
  document.getElementById('cat-pills').innerHTML=state.categories.map((c,i)=>`
    <div class="pill" style="background:${catColor(c.name)}22;color:${catColor(c.name)};">
      ${c.emoji} ${c.name}<button class="del" onclick="removeCategory(${i})">×</button>
    </div>`).join('');
  document.getElementById('sheets-dot').className='status-dot '+(state.sheetsUrl?'ok':'off');
  document.getElementById('sheets-url').value=state.sheetsUrl||'';
}
function addCategory() {
  const input=document.getElementById('new-cat-input'), val=input.value.trim();
  if (!val||state.categories.find(c=>c.name===val)) return;
  state.categories.push({ name: val, emoji: selectedEmoji });
  save(); input.value='';
  selectedEmoji='📌';
  document.getElementById('emoji-trigger').textContent='📌';
  renderSettings(); populateCatSelect();
}
function removeCategory(idx) { state.categories.splice(idx,1); save(); renderSettings(); populateCatSelect(); }
function saveSheetConfig() { state.sheetsUrl=document.getElementById('sheets-url').value.trim(); save(); renderSettings(); showToast('✅ Configuración guardada'); }

function populateCatSelect() {
  document.getElementById('f-cat').innerHTML=state.categories.map(c=>`<option value="${c.name}">${c.emoji} ${c.name}</option>`).join('');
}

// ── EXPORT ──
function exportCSV() {
  if (!state.expenses.length) { showToast('No hay datos','#f7a76c'); return; }
  const rows=[['Fecha','Descripción','Categoría','Monto','Moneda']];
  state.expenses.forEach(e=>rows.push([e.date,e.desc,e.cat,e.amount,e.currency]));
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(rows.map(r=>r.join(',')).join('\n'));
  a.download=`gastos_${new Date().toISOString().slice(0,7)}.csv`; a.click();
}
function clearAll() {
  if (!confirm('¿Borrar TODOS los datos? Esta acción no se puede deshacer.')) return;
  state.expenses=[]; save(); renderRecent(); showToast('🗑️ Datos borrados','#f76c8a');
}

// ── INIT ──
function init() {
  load();
  document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('header-sub').textContent=MONTHS[new Date().getMonth()]+' '+new Date().getFullYear();
  populateCatSelect(); renderRecent();
  document.getElementById('new-cat-input').addEventListener('keydown',e=>{ if(e.key==='Enter') addCategory(); });
  renderPickerTabs(0);
}
init();
</script>
